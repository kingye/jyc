<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JYC Monitor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        
        header { background: #16213e; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #0f3460; }
        header h1 { font-size: 20px; color: #e94560; }
        
        .stats-bar { display: flex; gap: 24px; font-size: 14px; }
        .stat { display: flex; gap: 8px; }
        .stat-label { color: #888; }
        .stat-value { color: #4ecca3; font-weight: 600; }
        
        .main { display: flex; height: calc(100vh - 60px); }
        .sidebar { width: 280px; background: #16213e; border-right: 1px solid #0f3460; padding: 16px; overflow-y: auto; }
        .sidebar h2 { font-size: 14px; color: #888; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        
        .channel-item { background: #0f3460; padding: 12px; border-radius: 8px; margin-bottom: 8px; }
        .channel-name { font-weight: 600; margin-bottom: 4px; }
        .channel-status { display: flex; align-items: center; gap: 6px; font-size: 12px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-dot.connected { background: #4ecca3; }
        .status-dot.disconnected { background: #e94560; }
        
        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        .panel { flex: 1; padding: 16px; overflow-y: auto; border-bottom: 1px solid #0f3460; }
        .panel h2 { font-size: 14px; color: #888; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        
        .thread-item { background: #16213e; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .thread-info { flex: 1; }
        .thread-name { font-weight: 600; margin-bottom: 4px; }
        .thread-meta { font-size: 12px; color: #888; }
        .thread-status { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .thread-status.idle { background: #0f3460; color: #888; }
        .thread-status.processing { background: #e94560; color: white; }
        .thread-status.waiting { background: #f39c12; color: white; }
        
        .events-panel { max-height: 300px; }
        .event-item { padding: 8px 12px; border-radius: 4px; margin-bottom: 4px; font-size: 12px; font-family: monospace; background: #0f3460; }
        .event-item.system { border-left: 3px solid #4ecca3; }
        .event-item.channel { border-left: 3px solid #3498db; }
        .event-item.processing { border-left: 3px solid #e94560; }
        
        .empty { color: #666; text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <header>
        <h1>JYC Monitor</h1>
        <div class="stats-bar">
            <div class="stat"><span class="stat-label">Version:</span><span class="stat-value" id="version">-</span></div>
            <div class="stat"><span class="stat-label">Started:</span><span class="stat-value" id="started">-</span></div>
            <div class="stat"><span class="stat-label">Messages:</span><span class="stat-value" id="messages">0</span></div>
            <div class="stat"><span class="stat-label">Errors:</span><span class="stat-value" id="errors">0</span></div>
        </div>
    </header>
    
    <div class="main">
        <aside class="sidebar">
            <h2>Channels</h2>
            <div id="channels"></div>
        </aside>
        
        <div class="content">
            <div class="panel">
                <h2>Active Threads</h2>
                <div id="threads"></div>
            </div>
            <div class="panel events-panel">
                <h2>Live Events</h2>
                <div id="events"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = new URLSearchParams(window.location.search).get('api') || 'http://127.0.0.1:9090';
        
        function formatTime(iso) {
            if (!iso) return '-';
            return new Date(iso).toLocaleTimeString();
        }
        
        async function loadStats() {
            try {
                const res = await fetch(`${API_URL}/api/stats`);
                const data = await res.json();
                document.getElementById('version').textContent = data.version;
                document.getElementById('started').textContent = formatTime(data.started_at);
                document.getElementById('messages').textContent = data.total_messages;
                document.getElementById('errors').textContent = data.total_errors;
            } catch (e) { console.error('Failed to load stats:', e); }
        }
        
        async function loadChannels() {
            try {
                const res = await fetch(`${API_URL}/api/channels`);
                const data = await res.json();
                const container = document.getElementById('channels');
                if (data.length === 0) {
                    container.innerHTML = '<div class="empty">No channels</div>';
                    return;
                }
                container.innerHTML = data.map(ch => `
                    <div class="channel-item">
                        <div class="channel-name">${ch.name}</div>
                        <div class="channel-status">
                            <span class="status-dot ${ch.connected ? 'connected' : 'disconnected'}"></span>
                            ${ch.channel_type} · ${ch.connected ? 'Connected' : 'Disconnected'}
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error('Failed to load channels:', e); }
        }
        
        async function loadThreads() {
            try {
                const res = await fetch(`${API_URL}/api/threads`);
                const data = await res.json();
                const container = document.getElementById('threads');
                if (data.length === 0) {
                    container.innerHTML = '<div class="empty">No active threads</div>';
                    return;
                }
                container.innerHTML = data.map(t => `
                    <div class="thread-item">
                        <div class="thread-info">
                            <div class="thread-name">${t.name}</div>
                            <div class="thread-meta">${t.channel} · ${t.current_sender || '-'} · Queue: ${t.queue_depth}</div>
                        </div>
                        <span class="thread-status ${t.status}">${t.status}</span>
                    </div>
                `).join('');
            } catch (e) { console.error('Failed to load threads:', e); }
        }
        
        let eventCount = 0;
        function addEvent(event) {
            const container = document.getElementById('events');
            const type = event.type.startsWith('System') ? 'system' : 
                         event.type.startsWith('Channel') ? 'channel' : 'processing';
            const html = `<div class="event-item ${type}">[${new Date().toLocaleTimeString()}] ${event.type}</div>`;
            container.insertAdjacentHTML('afterbegin', html);
            eventCount++;
            if (eventCount > 100) {
                container.lastElementChild?.remove();
            }
        }
        
        async function connectSSE() {
            try {
                const res = await fetch(`${API_URL}/api/events`);
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value);
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const event = JSON.parse(line.slice(6));
                                addEvent(event);
                            } catch (e) {}
                        }
                    }
                }
            } catch (e) {
                console.error('SSE error:', e);
                setTimeout(connectSSE, 5000);
            }
        }
        
        async function init() {
            loadStats();
            loadChannels();
            loadThreads();
            connectSSE();
            
            setInterval(loadStats, 5000);
            setInterval(loadChannels, 5000);
            setInterval(loadThreads, 5000);
        }
        
        init();
    </script>
</body>
</html>
